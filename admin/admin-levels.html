<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Earn - VIP Management</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#081120;
color:white;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:32px;
font-weight:800;
background:linear-gradient(90deg,#06b6d4,#6366f1);
-webkit-background-clip:text;
background-clip:text;
-webkit-text-fill-color:transparent;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:25px;
}

.card h2{
font-size:34px;
margin-top:10px;
}

.table-box{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#111c35;
padding:18px;
text-align:left;
}

td{
padding:18px;
border-bottom:1px solid rgba(255,255,255,.06);
}

.pending{
color:#f59e0b;
font-weight:700;
}

.approved{
color:#10b981;
font-weight:700;
}

.btn{
border:none;
padding:10px 18px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.approve{
background:#10b981;
color:white;
}

.reject{
background:#ef4444;
color:white;
margin-left:5px;
}

.vip{
padding:5px 12px;
border-radius:20px;
background:#2563eb;
}
.toolbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:15px;
flex-wrap:wrap;
}

#searchBox{
flex:1;
min-width:250px;
padding:15px;
background:#122243;
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
color:white;
font-size:15px;
outline:none;
}

.refreshBtn{
padding:15px 25px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.refreshBtn:hover{
transform:translateY(-2px);
background:#1d4ed8;
}

.approve:hover{
background:#059669;
}

.reject:hover{
background:#dc2626;
}

tbody tr:hover{
background:rgba(255,255,255,.05);
transition:.3s;
}
</style></head><body><div class="header">
<div class="logo">META EARN VIP MANAGEMENT</div>
</div><div class="stats"><div class="card">
<p>Total VIP Members</p>
<h2 id="vipMembers">0</h2>
</div><div class="card">
<p>Pending Requests</p>
<h2 id="pendingRequests">0</h2>
</div><div class="card">
<p>Today's Upgrades</p>
<h2 id="todayUpgrades">0</h2>

</div>
</div>
                  <div class="toolbar">

    <input
        type="text"
        id="searchBox"
        placeholder="🔍 Search username..."
        onkeyup="searchUser()">

    <button class="refreshBtn"
            onclick="loadVIPRequests()">

        🔄 Refresh

    </button>

</div>
<div class="table-box"><table><thead>
<tr>
    
<th>User</th>
<th>Current VIP</th>
<th>Requested VIP</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead><tbody id="vipRequests"><tr>
<td>john123</td>
<td><span class="vip">VIP 1</span></td>
<td><span class="vip">VIP 3</span></td>
<td><span class="pending">Pending</span></td>
<td>
<button class="btn approve"
onclick="approveLevel(1)">
Approve
</button><button class="btn reject"
onclick="rejectLevel(1)">
Reject
</button>

</td>
</tr></tbody></table></div><script>

const API = "https://meta-earn-14.onrender.com/api/admin";

window.onload = function () {
    loadVIPRequests();
};

async function loadVIPRequests() {

    try {

        const response = await fetch(API + "/level-requests");
        const data = await response.json();

        const table = document.getElementById("vipRequests");

        table.innerHTML = "";

        if (!data.success) {
            table.innerHTML =
            "<tr><td colspan='5'>Failed to load data</td></tr>";
            return;
        }

        if (data.requests.length === 0) {

            table.innerHTML =
            "<tr><td colspan='5'>No VIP requests found.</td></tr>";

            document.getElementById("pendingRequests").innerHTML = 0;

            return;

        }

        document.getElementById("pendingRequests").innerHTML =
        data.requests.length;

        data.requests.forEach(user => {

            table.innerHTML += `

            <tr>

                <td>${user.username}</td>

                <td>
                    <span class="vip">
                        VIP ${user.current_level}
                    </span>
                </td>

                <td>
                    <span class="vip">
                        VIP ${user.requested_level}
                    </span>
                </td>

                <td>
                    <span class="pending">
                        Pending
                    </span>
                </td>

                <td>

                    <button
                    class="btn approve"
                    onclick="approveLevel(${user.id})">

                    Approve

                    </button>

                    <button
                    class="btn reject"
                    onclick="rejectLevel(${user.id})">

                    Reject

                    </button>

                </td>

            </tr>

            `;

        });

    } catch (error) {

        console.log(error);

        document.getElementById("vipRequests").innerHTML =
        "<tr><td colspan='5'>Server connection failed.</td></tr>";

    }

}
//user scerch function
function searchUser(){

const input =
document.getElementById("searchBox")
.value
.toLowerCase();

const rows =
document.querySelectorAll("#vipRequests tr");

rows.forEach(row=>{

const text =
row.innerText.toLowerCase();

row.style.display =
text.includes(input)
? ""
: "none";

});

}

async function approveLevel(id) {

    try {

        const response = await fetch(
            API + "/levels/" + id + "/approve",
            {
                method: "PUT"
            }
        );

        const data = await response.json();

        alert(data.message);

        loadVIPRequests();

    } catch (error) {

        alert("Approval failed.");

    }

}

async function rejectLevel(id) {

    try {

        const response = await fetch(
            API + "/levels/" + id + "/reject",
            {
                method: "PUT"
            }
        );

        const data = await response.json();

        alert(data.message);

        loadVIPRequests();

    } catch (error) {

        alert("Rejection failed.");

    }

}

</script>

</script></body>
</html>
