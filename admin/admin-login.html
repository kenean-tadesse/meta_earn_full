<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meta_Earn Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    background:
    radial-gradient(circle at top,#0b1220,#050913);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}


.card{

    width:350px;

    background:
    rgba(255,255,255,.07);

    padding:30px;

    border-radius:20px;

    -webkit-backdrop-filter:blur(15px);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:0 0 25px #2563eb;

    animation: glow 2s infinite alternate;
}


@keyframes glow{

from{
box-shadow:0 0 10px #2563eb;
}

to{
box-shadow:0 0 30px #38bdf8;
}

}


h1{

text-align:center;

margin-bottom:25px;

}


input{

width:100%;

padding:14px;

margin:10px 0;

border-radius:12px;

border:none;

outline:none;

}


button{

width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

color:white;

background:
linear-gradient(135deg,#6366f1,#2563eb);

transition:.3s;

}


button:hover{

transform:scale(1.03);

}


#message{

margin-top:15px;

text-align:center;

font-weight:bold;

}


.red{
color:#ef4444;
}


.green{
color:#22c55e;
}

</style>

</head>


<body>


<div class="card">

<h1>
Admin Login
</h1>


<input 
id="username"
type="text"
placeholder="Admin Username">


<input 
id="password"
type="password"
placeholder="Admin Password">


<button onclick="login()">
Login
</button>


<div id="message">
</div>


</div>



<script>


async function login(){


const username =
document.getElementById("username").value;


const password =
document.getElementById("password").value;


const message =
document.getElementById("message");


try{


const response = await fetch(
"http://localhost:5000/api/auth/login",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username,
password

})

});



const data = await response.json();



if(data.success){


if(data.user.role !== "admin"){

message.className="red";

message.innerHTML =
"Access denied. Admin only.";

return;

}



localStorage.setItem(
"adminToken",
data.token
);


message.className="green";

message.innerHTML =
"Login successful";


setTimeout(()=>{

window.location.href =
"Admin.html";

},1000);



}else{


message.className="red";


message.innerHTML =
data.message || "Invalid login";


}


}catch(error){


message.className="red";


message.innerHTML =
"Server connection error";


}


}


</script>


</body>

</html>
