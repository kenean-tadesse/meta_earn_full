<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>META_EARN Admin Referral Center</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-size:30px;
color:#38bdf8;
}

.back-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:#2563eb;
color:#fff;
cursor:pointer;
font-size:18px;
}

.back-btn:hover{
background:#1d4ed8;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:18px;
border:1px solid #334155;
}

.card h3{
color:#94a3b8;
margin-bottom:10px;
font-size:16px;
}

.card h2{
font-size:30px;
color:#22c55e;
}

.top-bar{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.top-bar input,
.top-bar select{

padding:14px;
border-radius:10px;
border:1px solid #334155;
background:#1e293b;
color:#fff;
font-size:15px;
}

.top-bar input{
flex:1;
}

.table-container{

overflow:auto;
background:#1e293b;
border-radius:18px;
border:1px solid #334155;

}

table{

width:100%;
border-collapse:collapse;
min-width:1200px;

}

thead{

background:#2563eb;

}

th{

padding:15px;
text-align:left;

}

td{

padding:15px;
border-bottom:1px solid #334155;

}

.status{

padding:6px 14px;
border-radius:20px;
font-size:13px;
font-weight:bold;

}

.approved{

background:#14532d;
color:#22c55e;

}

.pending{

background:#78350f;
color:#facc15;

}

.rejected{

background:#7f1d1d;
color:#ef4444;

}

.action-btn{

padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
margin-right:5px;
font-size:13px;

}

.approve-btn{

background:#16a34a;

}

.reject-btn{

background:#dc2626;

}

.delete-btn{

background:#475569;

}

.action-btn:hover{

opacity:.85;

}

.pagination{

display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin-top:25px;

}

.pagination button{

padding:10px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;

}

.loader{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-size:24px;
z-index:9999;

}

.toast{

position:fixed;
right:30px;
bottom:30px;
background:#16a34a;
padding:15px 20px;
border-radius:10px;
display:none;

}

@media(max-width:768px){

.header{

flex-direction:column;
gap:15px;

}

.top-bar{

flex-direction:column;

}

}

</style>

</head>

<body>

<div class="loader" id="loader">
Loading...
</div>

<div class="container">

<div class="header">

<button type="button" class="back-btn" onclick="goBack()" aria-label="Go back">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h1>
Admin Referral Dashboard
</h1>

</div>

<div class="stats">

<div class="card">
<h3>Total Referrals</h3>
<h2 id="totalReferrals">0</h2>
</div>

<div class="card">
<h3>Approved</h3>
<h2 id="approvedCount">0</h2>
</div>

<div class="card">
<h3>Pending</h3>
<h2 id="pendingCount">0</h2>
</div>

<div class="card">
<h3>Rejected</h3>
<h2 id="rejectedCount">0</h2>
</div>

<div class="card">
<h3>Total Commission</h3>
<h2 id="totalCommission">0 ETB</h2>
</div>

</div>

<div class="top-bar">

<input
type="text"
id="searchInput"
placeholder="Search by name, username...">

<select id="statusFilter" aria-label="Filter by status">

<option value="">All Status</option>

<option value="Approved">
Approved
</option>

<option value="Pending">
Pending
</option>

<option value="Rejected">
Rejected
</option>

</select>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>Name</th>

<th>Username</th>

<th>Status</th>

<th>Commission</th>

<th>Date</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="referralTable">

<tr>

<td colspan="6" style="text-align:center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<div class="pagination">

<button id="prevPage">
Previous
</button>

<span id="pageInfo">

Page 1

</span>

<button id="nextPage">
Next
</button>

</div>

<div id="toast" class="toast">
Success
</div>

</div>

<script src="./admin-referral.js"></script>
</body>
</html>
