<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meta_Earn Admin - Task Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
}

h1{
margin-bottom:25px;
color:#38bdf8;
}

.card{

background:#1e293b;

border-radius:15px;

padding:20px;

margin-bottom:30px;

box-shadow:0 0 20px rgba(0,0,0,.35);

}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

}

input,
textarea,
select{

width:100%;

padding:12px;

border:none;

border-radius:8px;

background:#334155;

color:white;

}

textarea{

height:100px;

resize:none;

}

button{

padding:12px 18px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}

.create{

background:#2563eb;

color:white;

}

.edit{

background:#eab308;

color:black;

}

.delete{

background:#dc2626;

color:white;

}

.toggle{

background:#16a34a;

color:white;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th{

background:#1d4ed8;

padding:14px;

}

td{

padding:12px;

border-bottom:1px solid #334155;

text-align:center;

}

.active{

color:#22c55e;

font-weight:bold;

}

.inactive{

color:#ef4444;

font-weight:bold;

}

.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.6);

justify-content:center;

align-items:center;

}

.modal-content{

width:600px;

background:#1e293b;

padding:25px;

border-radius:15px;

}

.message{

margin-top:15px;

font-weight:bold;

color:#22c55e;

}

</style>

</head>

<body>

<div class="container">

<h1>Meta_Earn Task Management</h1>

<div class="card">

<h2>Create Task</h2>

<div class="grid">

<input
id="title"
placeholder="Task Title">

<input
id="commission"
type="number"
placeholder="Commission">

<textarea
id="description"
placeholder="Task Description"></textarea>

<input
id="vip"
type="number"
placeholder="Required VIP Level">

</div>

<br>

<button
class="create"
onclick="createTask()">

Create Task

</button>

<div
id="message"
class="message">

</div>

</div>

<div class="card">

<h2>All Tasks</h2>

<table>

<thead>

<tr>

<th>ID</th>

<th>Title</th>

<th>Description</th>

<th>Commission</th>

<th>VIP</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody
id="taskTable">

<tr>

<td colspan="7">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<div
class="modal"
id="editModal">

<div class="modal-content">

<h2>Edit Task</h2>

<input
type="hidden"
id="editId">

<input
id="editTitle"
placeholder="Title">

<br><br>

<textarea
id="editDescription"></textarea>

<br>

<input
id="editCommission"
type="number"
placeholder="Commission">

<br><br>

<input
id="editVIP"
type="number"
placeholder="VIP">

<br><br>

<select
id="editStatus">

<option value="active">

Active

</option>

<option value="inactive">

Inactive

</option>

</select>

<br><br>

<button
class="create"
onclick="updateTask()">

Save

</button>

<button
class="delete"
onclick="closeModal()">

Cancel

</button>

</div>

</div>

<!-- JavaScript will go here in Part 2B -->
<script src="admin-tasks.js"></script>

</body>
</html>
