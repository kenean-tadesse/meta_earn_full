<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meta Earn Admin - Withdrawal Management</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#07111f;
color:white;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
font-size:30px;
font-weight:700;
color:#38bdf8;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,.05);
border-radius:18px;
padding:20px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 20px rgba(37,99,235,.25);
}

.card h3{
font-size:15px;
color:#94a3b8;
margin-bottom:10px;
}

.card h2{
font-size:32px;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
background:#111827;
color:white;
font-size:15px;
}

.table-container{

background:rgba(255,255,255,.05);

border-radius:18px;

padding:20px;

overflow:auto;

box-shadow:0 0 20px rgba(37,99,235,.25);

}

table{

width:100%;

border-collapse:collapse;

}

th{

padding:15px;

color:#38bdf8;

font-size:14px;

border-bottom:1px solid rgba(255,255,255,.08);

}

td{

padding:15px;

text-align:center;

border-bottom:1px solid rgba(255,255,255,.06);

}

.pending{

color:#facc15;

font-weight:bold;

}

.approved{

color:#22c55e;

font-weight:bold;

}

.rejected{

color:#ef4444;

font-weight:bold;

}

.approve-btn{

background:#22c55e;

color:white;

padding:9px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:600;

margin-right:5px;

}

.reject-btn{

background:#ef4444;

color:white;

padding:9px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:600;

}

.approve-btn:hover{

opacity:.9;

}

.reject-btn:hover{

opacity:.9;

}

.empty{

text-align:center;

padding:40px;

color:#94a3b8;

}

@media(max-width:900px){

table{

font-size:13px;

}

}

</style>

</head>

<body>

<div class="header">

<div>

<h1>Withdrawal Management</h1>

<div class="subtitle">

Manage and approve user withdrawal requests

</div>

</div>

</div>

<div class="stats">

<div class="card">

<h3>Total Withdrawals</h3>

<h2 id="totalWithdrawals">0</h2>

</div>

<div class="card">

<h3>Pending</h3>

<h2 id="pendingWithdrawals">0</h2>

</div>

<div class="card">

<h3>Approved</h3>

<h2 id="approvedWithdrawals">0</h2>

</div>

<div class="card">

<h3>Rejected</h3>

<h2 id="rejectedWithdrawals">0</h2>

</div>

</div>

<div class="search-box">

<input

type="text"

id="search"

placeholder="Search by username..."

onkeyup="searchWithdrawal()">

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>

<th>User</th>

<th>Amount</th>

<th>Bank</th>

<th>Account</th>

<th>Status</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>

<tbody id="withdrawTable">

<tr>

<td colspan="8" class="empty">

Loading withdrawals...

</td>

</tr>

</tbody>

</table>

</div>

<script>

const token = localStorage.getItem("adminToken") || localStorage.getItem("token");

let allWithdrawals=[]; // ===============================
// LOAD WITHDRAWALS
// ===============================

async function loadWithdrawals() {

    if (!token) {
        alert("Admin login required.");
        window.location.href = "admin-login.html";
        return;
    }

    try {

        const response = await fetch(
            "http://localhost:5000/api/withdrawals",
            {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            }
        );

        const data = await response.json();

        const table = document.getElementById("withdrawTable");

        table.innerHTML = "";

        if (!data.success) {

            table.innerHTML = `
            <tr>
                <td colspan="8" class="empty">
                    Failed to load withdrawals
                </td>
            </tr>`;

            return;
        }

        allWithdrawals = data.withdrawals;

        document.getElementById("totalWithdrawals").innerHTML =
            allWithdrawals.length;

        document.getElementById("pendingWithdrawals").innerHTML =
            allWithdrawals.filter(x => x.status == "pending").length;

        document.getElementById("approvedWithdrawals").innerHTML =
            allWithdrawals.filter(x => x.status == "approved").length;

        document.getElementById("rejectedWithdrawals").innerHTML =
            allWithdrawals.filter(x => x.status == "rejected").length;

        displayWithdrawals(allWithdrawals);

    } catch (error) {

        document.getElementById("withdrawTable").innerHTML = `
        <tr>
            <td colspan="8" class="empty">
                Server Connection Failed
            </td>
        </tr>`;

    }

}

// ===============================
// DISPLAY TABLE
// ===============================

function displayWithdrawals(list) {

    const table = document.getElementById("withdrawTable");

    table.innerHTML = "";

    if (list.length == 0) {

        table.innerHTML = 
       ` <tr>
            <td colspan="8" class="empty">
                No withdrawal requests found
            </td>
        </tr>;`

        return;

    }

    list.forEach(item => {

        let action = "";

        if (item.status == "pending") {

            action = `
            <button class="approve-btn"
            onclick="approveWithdrawal(${item.id})">
            Approve
            </button>

            <button class="reject-btn"
            onclick="rejectWithdrawal(${item.id})">
            Reject
            </button>`;

        } else {

            action = "Completed";

        }

        table.innerHTML += `

<tr>

<td>${item.id}</td>

<td>${item.username}</td>

<td>${Number(item.amount).toFixed(2)} Birr</td>

<td>${item.bank_name}</td>

<td>${item.bank_account}</td>

<td class="${item.status}">

${item.status.toUpperCase()}

</td>

<td>

${new Date(item.created_at).toLocaleString()}

</td>

<td>

${action}

</td>

</tr>

`;

    });

}

// ===============================
// SEARCH
// ===============================

function searchWithdrawal(){

const text=document.getElementById("search")
.value.toLowerCase();

const filtered=allWithdrawals.filter(x=>

x.username.toLowerCase().includes(text)

);

displayWithdrawals(filtered);

}

// ===============================
// APPROVE
// ===============================

async function approveWithdrawal(id){

if(!confirm("Approve this withdrawal?"))
return;

const response=await fetch(

`http://localhost:5000/api/withdrawals/approve/${id}`,

{

method:"PUT",

headers:{

Authorization:`Bearer ${token}`

}

}

);

const data=await response.json();

alert(data.message);

loadWithdrawals();

}

// ===============================
// REJECT
// ===============================

async function rejectWithdrawal(id){

if(!confirm("Reject this withdrawal?"))
return;

const response=await fetch(

`http://localhost:5000/api/withdrawals/reject/${id}`,

{

method:"PUT",

headers:{

Authorization:`Bearer ${token}`

}

}

);

const data=await response.json();

alert(data.message);

loadWithdrawals();

}

// ===============================
// AUTO REFRESH
// ===============================

loadWithdrawals();

setInterval(loadWithdrawals,10000);

</script>

</body>

</html>
