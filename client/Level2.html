<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meta Earn | VIP Level 2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#081120;
color:#fff;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#4f46e5 0%,transparent 35%),
radial-gradient(circle at bottom right,#06b6d4 0%,transparent 35%);
z-index:-1;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
}

.logo{
font-size:34px;
font-weight:800;
background:linear-gradient(90deg,#06b6d4,#6366f1);
background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.vipBadge{
padding:12px 25px;
border-radius:40px;
background:linear-gradient(90deg,#2563eb,#06b6d4);
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,.08);
-webkit-backdrop-filter:blur(18px);
backdrop-filter:blur(18px);
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
}

.title{
opacity:.7;
font-size:14px;
margin-bottom:10px;
}

.value{
font-size:30px;
font-weight:bold;
}

.green{
color:#22c55e;
}

.orange{
color:#f59e0b;
}

.blue{
color:#38bdf8;
}

.progressBox{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
margin-bottom:30px;
}

.progress{
height:18px;
background:#1e293b;
border-radius:30px;
overflow:hidden;
margin-top:15px;
}

.progressFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#06b6d4);
transition:.5s;
}

.sectionTitle{
font-size:28px;
font-weight:700;
margin-bottom:20px;
}

.taskList{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.task{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:18px;
border:1px solid rgba(255,255,255,.1);
transition:.3s;
}

.task:hover{
transform:translateY(-5px);
}

.task h3{
margin-bottom:10px;
}

.task p{
opacity:.7;
margin-bottom:20px;
}

.reward{
color:#22c55e;
font-weight:bold;
margin-bottom:15px;
}

.task button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:linear-gradient(90deg,#6366f1,#06b6d4);
color:white;
}

.task button:hover{
opacity:.9;
}

.footer{
text-align:center;
margin-top:50px;
opacity:.6;
}

.logoutBtn{
background:#dc2626;
padding:10px 20px;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:bold;
}

.logoutBtn:hover{
background:#b91c1c;
}

.back-button{
position:fixed;
top:20px;
left:20px;
width:50px;
height:50px;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:#fff;
text-decoration:none;
font-size:26px;
font-weight:bold;
border-radius:50%;
box-shadow:0 8px 20px rgba(0,0,0,.25);
cursor:pointer;
z-index:9999;
border:none;
outline:none;
transition:.25s;
}

.back-button:hover{
background:linear-gradient(135deg,#1d4ed8,#0891b2);
box-shadow:0 12px 25px rgba(0,0,0,.35);
}

.back-button:active{
transform:scale(.96);
}
</style>


</head>

<body>

    <button class="back-button" onclick="goBack()" title="Back">
    ←
</button>
<div class="container">

<div class="header">

<div>

<div class="logo">

META EARN

</div>

<div id="vipText">

VIP Level 2

</div>

</div>

<button class="logoutBtn" onclick="logout()">

Logout

</button>

</div>

<div class="cards">

<div class="card">

<div class="title">

Wallet Balance

</div>

<div class="value green">

<span id="balance">0.00</span> ETB

</div>

</div>

<div class="card">

<div class="title">

VIP Level

</div>

<div class="value blue" id="vipLevel">

2

</div>

</div>

<div class="card">

<div class="title">

Completed Today

</div>

<div class="value purple">

<span id="completedCount">0</span>

</div>

</div>

<div class="card">

<div class="title">

Available Tasks

</div>

<div class="value">

<span id="taskCount">0</span>

</div>

</div>

</div>

<div class="progressBox">

<h2>Today's Progress</h2>

<div class="progress">

<div class="progressFill" id="progressFill"></div>

</div>

</div>

<h2 class="sectionTitle">

VIP 2 Tasks

</h2>

<div class="taskList" id="taskContainer">

Loading tasks...

</div>

<div class="footer">

© 2026 Meta Earn

</div>

</div>

<script>

function goBack(){

    // If there is a previous page
    if(document.referrer && history.length > 1){

        history.back();

    }else{

        // Change this to your dashboard or home page
        window.location.href = "dashboard.html";

    }

}
const API="http://localhost:5000/api";

const token=localStorage.getItem("token");

if(!token){

location.href="login.html";

}

let completed=0;

let totalTasks=0;

let wallet=0;

let vip=1;

async function loadProfile(){

const res=await fetch(API+"/auth/profile",{

headers:{
Authorization:"Bearer "+token
}

});

const data=await res.json();

if(!data.success){

localStorage.removeItem("token");

location.href="login.html";

return;

}

wallet=data.user.balance;

vip=data.user.vip_level;

document.getElementById("balance").innerHTML=wallet;

document.getElementById("vipLevel").innerHTML=vip;

document.getElementById("vipText").innerHTML="VIP "+vip;

}

async function loadTasks(){

const res=await fetch(API+"/tasks",{

headers:{
Authorization:"Bearer "+token
}

});

const data=await res.json();

if(!data.success){

alert(data.message);

return;

}

totalTasks=data.tasks.length;

document.getElementById("taskCount").innerHTML=totalTasks;

const container=document.getElementById("taskContainer");

container.innerHTML="";

data.tasks.forEach(task=>{

const card=document.createElement("div");

card.className="task";

card.innerHTML=`

<h3>${task.title}</h3>

<p>${task.description}</p>

<div class="reward">

Reward : ${task.commission} ETB

</div>

<button onclick="completeTask(${task.id},this)">

Complete Task

</button>

`;

container.appendChild(card);

});

updateProgress();

}
async function completeTask(taskId, button){

button.disabled=true;
button.innerHTML="Processing...";

try{

const res=await fetch(API+"/tasks/complete/"+taskId,{

method:"POST",

headers:{
Authorization:"Bearer "+token,
"Content-Type":"application/json"
}

});

const data=await res.json();

if(!data.success){

alert(data.message);

button.disabled=false;
button.innerHTML="Complete Task";

return;

}

button.innerHTML="✔ Completed";
button.style.background="#16a34a";
button.disabled=true;

wallet=data.balance;

document.getElementById("balance").innerHTML=
Number(wallet).toFixed(2);

completed++;

document.getElementById("completedCount").innerHTML=
completed;

updateProgress();

alert(
"Congratulations!\n\n"+
data.message+
"\n\nReward : "+
data.reward+
" ETB"
);

}
catch(error){

console.log(error);

alert("Unable to connect to server.");

button.disabled=false;
button.innerHTML="Complete Task";

}

}

function updateProgress(){

let percent=0;

if(totalTasks>0){

percent=(completed/totalTasks)*100;

}

document.getElementById("progressFill").style.width=
percent+"%";

}

function logout(){

localStorage.removeItem("token");

location.href="login.html";

}

window.onload=async()=>{

await loadProfile();

await loadTasks();

};

</script>

</body>

</html>
