.upgrade-card{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px;
border-radius:22px;
cursor:pointer;
position:relative;
overflow:hidden;
background:linear-gradient(270deg,#7c3aed,#06b6d4,#f59e0b,#7c3aed);
background-size:300% 300%;
animation:gradientMove 6s ease infinite;
box-shadow:0 10px 35px rgba(124,58,237,.35);
transition:.3s;
}

.upgrade-card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 15px 50px rgba(124,58,237,.55);
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Shine effect */
.upgrade-card::before{
content:"";
position:absolute;
top:0;
left:-150%;
width:60%;
height:100%;
background:rgba(255,255,255,.25);
transform:skewX(-25deg);
animation:shine 2.5s infinite;
}

@keyframes shine{
0%{left:-150%;}
100%{left:150%;}
}

/* Icon animation */
.icon{
font-size:28px;
animation:float 2s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

.text{

margin-left:12px;

.title{

.subtitle{

.arrow{

.premium-referral-btn:hover{

.referral-icon{

.referral-code-box{

.referral-label{

.referral-code-box input{

.referral-code-box button{

    transition:.3s;

.referral-code-box button:hover{

const token = localStorage.getItem("token");

if (!token) {
    alert("Please login first");

async function loadProfile() {
    try {
        const response = await fetch(
            `${API}/api/users/profile`,
            {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                }

            user.fullname || user.username;

        document.getElementById("email").innerText =

        document.getElementById("balance").innerText =
            "ETB " + Number(user.balance).toFixed(2);

        document.getElementById("vip").innerText =
            "👑 VIP " + user.vip_level;

  document.getElementById("dashboardReferralCode").value =
    user.referral_code || "----";

}

        document.getElementById("avatar").innerText =

function randomAmount(){

).toLocaleString();

function randomTime(){

const r=Math.floor(Math.random()*3);

if(r===0){

return Math.floor(Math.random()*55+5)

}

if(r===1){

return Math.floor(Math.random()*50+1)
+" minutes ago";

}

+" hours ago";

}
