<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meta Earn | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#081120;
color:#fff;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#4f46e5 0%,transparent 35%),
radial-gradient(circle at bottom right,#06b6d4 0%,transparent 35%);
z-index:-1;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
}

.logo{
font-size:34px;
font-weight:800;
background:linear-gradient(90deg,#06b6d4,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.backBtn{

background:#2563eb;

color:#fff;

padding:12px 20px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

padding:25px;

border-radius:20px;

border:1px solid rgba(255,255,255,.1);

}

.title{

font-size:14px;

opacity:.7;

margin-bottom:10px;

}

.value{

font-size:30px;

font-weight:bold;

}

.green{

color:#22c55e;

}

.blue{

color:#38bdf8;

}

.orange{

color:#f59e0b;

}

.tableBox{

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:20px;

padding:20px;

overflow-x:auto;

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:#1e293b;

padding:16px;

text-align:left;

}

td{

padding:15px;

border-bottom:1px solid rgba(255,255,255,.08);

}

tr:hover{

background:rgba(255,255,255,.05);

}

.status{

padding:6px 14px;

border-radius:30px;

font-size:13px;

font-weight:bold;

display:inline-block;

}

.completed{

background:#16a34a;

}

.pending{

background:#f59e0b;

}

.rejected{

background:#dc2626;

}

.loading{

text-align:center;

padding:40px;

font-size:20px;

}

.empty{

text-align:center;

padding:40px;

opacity:.7;

}

.footer{

margin-top:40px;

text-align:center;

opacity:.6;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">

META EARN

</div>

<button
class="backBtn"
onclick="history.back()">

← Back

</button>

</div>

<div class="cards">

<div class="card">

<div class="title">

Wallet Balance

</div>

<div
class="value green"
id="balance">

0.00 ETB

</div>

</div>

<div class="card">

<div class="title">

Completed Orders

</div>

<div
class="value blue"
id="totalOrders">

0

</div>

</div>

<div class="card">

<div class="title">

Total Earnings

</div>

<div
class="value orange"
id="totalCommission">

0 ETB

</div>

</div>

</div>

<div class="tableBox">

<table>

<thead>

<tr>

<th>#</th>

<th>Task</th>

<th>Reward</th>

<th>Status</th>

<th>Date</th>

</tr>

</thead>

<tbody
id="ordersBody">

<tr>

<td
colspan="5"
class="loading">

Loading Orders...

</td>

</tr>

</tbody>

</table>

</div>

<div class="footer">

© 2026 Meta Earn

</div>

</div>

<script>

const API="https://meta-earn-14.onrender.com/api";

const token=localStorage.getItem("token");

if(!token){

location.href="login.html";

}

let totalCommission=0;
async function loadProfile(){

try{

const res=await fetch(API+"/auth/profile",{

headers:{
Authorization:"Bearer "+token
}

});

const data=await res.json();

if(!data.success){

localStorage.removeItem("token");

location.href="login.html";

return;

}

document.getElementById("balance").innerHTML=
Number(data.user.balance).toFixed(2)+" ETB";

}catch(error){

console.log(error);

alert("Unable to load profile.");

}

}

async function loadOrders(){

try{

const res=await fetch(API+"/tasks/orders/history",{

headers:{
Authorization:"Bearer "+token
}

});

const data=await res.json();

const tbody=document.getElementById("ordersBody");

tbody.innerHTML="";

if(!data.success){

tbody.innerHTML=`
<tr>
<td colspan="5" class="empty">
Unable to load orders.
</td>
</tr>
`;

return;

}

if(data.orders.length===0){

tbody.innerHTML=`
<tr>
<td colspan="5" class="empty">
No completed orders found.
</td>
</tr>
`;

return;

}

document.getElementById("totalOrders").innerHTML=
data.orders.length;

totalCommission=0;

data.orders.forEach((order,index)=>{

totalCommission+=Number(order.commission);

let badge="completed";

if(order.status==="pending"){

badge="pending";

}

if(order.status==="rejected"){

badge="rejected";

}

const row=document.createElement("tr");

row.innerHTML=`

<td>${index+1}</td>

<td>${order.title}</td>

<td>${Number(order.commission).toFixed(2)} ETB</td>

<td>

<span class="status ${badge}">

${order.status}

</span>

</td>

<td>

${new Date(order.created_at).toLocaleString()}

</td>

`;

tbody.appendChild(row);

});

document.getElementById("totalCommission").innerHTML=

totalCommission.toFixed(2)+" ETB";

}catch(error){

console.log(error);

document.getElementById("ordersBody").innerHTML=`

<tr>

<td colspan="5" class="empty">

Server Connection Failed

</td>

</tr>

`;

}

}

window.onload=async()=>{

await loadProfile();

await loadOrders();

};

</script>

</body>

</html>
