<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>META_EARN Referral Center</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

background:#0f172a;
color:#fff;

}

.container{

width:95%;
max-width:1400px;
margin:auto;
padding:30px;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;

}

.header h1{

font-size:32px;
color:#38bdf8;

}

.back-btn{

width:48px;
height:48px;

border-radius:50%;
border:none;

cursor:pointer;

background:#2563eb;
color:#fff;

font-size:20px;

}

.back-btn:hover{

background:#1d4ed8;

}

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.card{

background:#1e293b;

border-radius:18px;

padding:25px;

border:1px solid #334155;

transition:.3s;

}

.card:hover{

transform:translateY(-4px);

}

.card h3{

color:#94a3b8;

margin-bottom:10px;

font-size:16px;

}

.card h2{

font-size:32px;

color:#22c55e;

}

.referral-box{

background:#1e293b;

padding:25px;

border-radius:18px;

border:1px solid #334155;

margin-bottom:25px;

}

.referral-box h2{

margin-bottom:20px;

}

.referral-row{

display:flex;

gap:10px;

}

.referral-row input{

flex:1;

padding:14px;

background:#0f172a;

border:1px solid #334155;

border-radius:10px;

color:#fff;

font-size:15px;

}

.copy-btn{

padding:14px 30px;

border:none;

border-radius:10px;

background:#2563eb;

color:#fff;

cursor:pointer;

font-weight:bold;

}

.copy-btn:hover{

background:#1d4ed8;

}

.share-buttons{

display:flex;

flex-wrap:wrap;

gap:12px;

margin-top:20px;

}

.share-buttons button{

padding:12px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

color:#fff;

}

.whatsapp{

background:#22c55e;

}

.telegram{

background:#0ea5e9;

}

.facebook{

background:#2563eb;

}

.twitter{

background:#111827;

}

.search-box{

margin:25px 0;

}

.search-box input{

width:100%;

padding:15px;

background:#1e293b;

border:1px solid #334155;

border-radius:10px;

color:#fff;

font-size:15px;

}

.table-container{

overflow:auto;

background:#1e293b;

border-radius:18px;

border:1px solid #334155;

}

table{

width:100%;

border-collapse:collapse;

min-width:900px;

}

thead{

background:#2563eb;

}

th{

padding:16px;

text-align:left;

}

td{

padding:16px;

border-bottom:1px solid #334155;

}

.status{

padding:6px 12px;

border-radius:20px;

font-size:13px;

font-weight:bold;

}

.approved{

background:#14532d;

color:#22c55e;

}

.pending{

background:#78350f;

color:#facc15;

}

.rejected{

background:#7f1d1d;

color:#ef4444;

}

.pagination{

display:flex;

justify-content:center;

align-items:center;

gap:10px;

margin-top:25px;

}

.pagination button{

padding:10px 18px;

border:none;

border-radius:8px;

background:#2563eb;

color:#fff;

cursor:pointer;

}

.pagination button:hover{

background:#1d4ed8;

}

.loader{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#0f172a;

display:flex;

justify-content:center;

align-items:center;

font-size:24px;

z-index:9999;

}

.toast{

position:fixed;

right:30px;

bottom:30px;

background:#16a34a;

padding:15px 20px;

border-radius:10px;

display:none;

}

@media(max-width:768px){

.header{

flex-direction:column;
gap:15px;

}

.referral-row{

flex-direction:column;

}

.share-buttons{

flex-direction:column;

}

}

</style>

</head>

<body>

<div class="loader" id="loader">

Loading...

</div>

<div class="container">

<div class="header">

<button class="back-btn" type="button" title="Go back" onclick="goBack()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h1>

Referral Center

</h1>

</div>

<div class="stats">

<div class="card">

<h3>Referral Earnings</h3>

<h2 id="earnings">0 ETB</h2>

</div>

<div class="card">

<h3>Direct Referrals</h3>

<h2 id="direct">0</h2>

</div>

<div class="card">

<h3>Team Members</h3>

<h2 id="team">0</h2>

</div>

<div class="card">

<h3>Wallet Balance</h3>

<h2 id="wallet">0 ETB</h2>

</div>

<div class="stat-card">
    <h3>Commission</h3>
    <span id="commission">0 ETB</span>
</div>

</div>

<div class="referral-box">

<h2>Your Referral Link</h2>

<div class="referral-row">

<input
id="referralLink"
placeholder="Your referral link"
readonly>

<button
class="copy-btn"
onclick="copyReferral()">

Copy

</button>

</div>

<div class="share-buttons">

<button
class="whatsapp"
onclick="shareWhatsApp()">

<i class="fa-brands fa-whatsapp"></i>

WhatsApp

</button>

<button
class="telegram"
onclick="shareTelegram()">

<i class="fa-brands fa-telegram"></i>

Telegram

</button>

<button
class="facebook"
onclick="shareFacebook()">

<i class="fa-brands fa-facebook"></i>

Facebook

</button>

<button
class="twitter"
onclick="shareTwitter()">

<i class="fa-brands fa-x-twitter"></i>

X

</button>

</div>

</div>

<div class="search-box">

<input
id="searchInput"
type="text"
placeholder="Search referrals...">

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>Name</th>

<th>Username</th>

<th>Status</th>

<th>Commission</th>

<th>Date</th>

</tr>

</thead>

<tbody id="referralTable">
    <tr>

<td colspan="5" style="text-align:center;padding:30px;">

No referrals found.

</td>

</tr>

</tbody>

</table>

</div>

<div class="pagination">

<button id="prevPage">

<i class="fa-solid fa-angle-left"></i>

Previous

</button>

<span id="pageInfo">

Page 1 of 1

</span>

<button id="nextPage">

Next

<i class="fa-solid fa-angle-right"></i>

</button>

</div>

<div style="margin-top:35px;">

<h2 style="margin-bottom:15px;color:#38bdf8;">

Referral QR Code

</h2>

<div style="
background:#1e293b;
padding:25px;
border-radius:18px;
border:1px solid #334155;
display:flex;
justify-content:center;
align-items:center;
">

<div id="qrcode"></div>

</div>

</div>

<div id="toast" class="toast">

Referral link copied successfully.

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="./referral.js"></script>

</body>

</html>
