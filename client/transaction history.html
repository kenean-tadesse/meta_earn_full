<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meta_Earn | Transaction Center</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:32px;
color:#38bdf8;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
border:1px solid #334155;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #38bdf8;
}

.card h3{
color:#94a3b8;
margin-bottom:10px;
}

.card h2{
color:#22c55e;
}

.table-container{
background:#1e293b;
border-radius:20px;
overflow:hidden;
border:1px solid #334155;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #334155;
}

.deposit{
color:#22c55e;
font-weight:bold;
}

.withdrawal{
color:#ef4444;
font-weight:bold;
}

.work{
color:#facc15;
font-weight:bold;
}

.pending{
color:orange;
}

.completed{
color:#22c55e;
}
.back-button{
position:fixed;
top:20px;
left:20px;
width:50px;
height:50px;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:#fff;
text-decoration:none;
font-size:26px;
font-weight:bold;
border-radius:50%;
box-shadow:0 8px 20px rgba(0,0,0,.25);
cursor:pointer;
z-index:9999;
border:none;
outline:none;
transition:.25s;
}

.back-button:hover{
background:linear-gradient(135deg,#1d4ed8,#0891b2);
box-shadow:0 12px 25px rgba(0,0,0,.35);
}

.back-button:active{
transform:scale(.96);
}
</style>
</head>

<body>
<button class="back-button" onclick="goBack()" title="Back">
    ←
</button>
<div class="header">
<h1>Transaction Center</h1>
</div>

<div class="summary">

<div class="card">
<h3>Total Deposits</h3>
<h2>12,500 ETB</h2>
</div>

<div class="card">
<h3>Total Withdrawals</h3>
<h2>4,000 ETB</h2>
</div>

<div class="card">
<h3>Work Compensation</h3>
<h2>2,350 ETB</h2>
</div>

<div class="card">
<h3>Available Balance</h3>
<h2>10,850 ETB</h2>
</div>

</div>

<div class="table-container">

<table>

<thead>

<tr>
<th>ID</th>
<th>Type</th>
<th>Amount</th>
<th>Status</th>
<th>Date</th>
</tr>

</thead>

<tbody id="historyTable">

<tr>
<td>1</td>
<td class="deposit">Deposit</td>
<td>500 ETB</td>
<td class="completed">Approved</td>
<td>2026-06-24</td>
</tr>

<tr>
<td>2</td>
<td class="work">Work Compensation</td>
<td>30 ETB</td>
<td class="completed">Completed</td>
<td>2026-06-24</td>
</tr>

<tr>
<td>3</td>
<td class="withdrawal">Withdrawal</td>
<td>200 ETB</td>
<td class="pending">Pending</td>
<td>2026-06-24</td>
</tr>

</tbody>

</table>

</div>

<script>
function goBack(){

    // If there is a previous page
    if(document.referrer && history.length > 1){

        history.back();

    }else{

        // Change this to your dashboard or home page
        window.location.href = "dashboard.html";

    }

}
async function loadHistory(){

    const token = localStorage.getItem("token");

    try{

        const response = await fetch(
            "http://localhost:5000/api/history",
            {
                headers:{
                    Authorization: `Bearer ${token}`
                }
            }
        );

        const data = await response.json();

        if(!data.success) return;

        let html = "";

        data.history.forEach(item => {
            html += `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.type}</td>
                    <td>${item.amount} ETB</td>
                    <td>${item.status}</td>
                    <td>${item.created_at}</td>
                </tr>
            `;
        });

        document.getElementById("historyTable").innerHTML = html;

    } catch(error) {
        console.log(error);
    }

}

loadHistory();

</script>

</body>
</html>
